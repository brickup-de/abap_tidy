<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}{{ .Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      color: #333;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: #0066cc;
      color: white;
      padding: 20px;
      margin-bottom: 20px;
    }
    header h1 {
      margin: 0;
    }
    nav {
      background: #f0f0f0;
      padding: 10px;
      margin-bottom: 20px;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 20px;
    }
    nav a {
      text-decoration: none;
      color: #333;
    }
    main {
      padding: 20px;
    }
    article {
      margin-bottom: 40px;
    }
    h1, h2, h3, h4 {
      color: #0066cc;
    }
    pre {
      background: #f5f5f5;
      padding: 15px;
      overflow-x: auto;
      border-radius: 5px;
    }
    code {
      background: #f5f5f5;
      padding: 2px 4px;
      border-radius: 3px;
    }
    pre code {
      background: none;
      padding: 0;
    }
    footer {
      margin-top: 40px;
      padding: 20px;
      border-top: 1px solid #eee;
      color: #666;
    }
  </style>
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header>
    <h1><a href="/" style="color: white; text-decoration: none;">{{ .Site.Title }}</a></h1>
    <p style="margin: 5px 0 0 0;">{{ .Site.Params.description }}</p>
  </header>
  
  {{ block "nav" . }}
  <nav>
    <ul>
      {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
  {{ end }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <p>{{ .Site.Params.author }} | {{ now.Format "2006" }}</p>
  </footer>
</body>
</html>
