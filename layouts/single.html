{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}

{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ with .Date }}
      <time datetime="{{ . }}" style="color: #666; font-size: 0.9em;">
        {{ . | dateFormat "January 2, 2006" }}
      </time>
    {{ end }}
    
    {{ if .Params.license }}
      <p style="font-size: 0.8em; color: #666; margin-top: 10px;">
        License: <a href="{{ .Params.license_url }}">{{ .Params.license }}</a>
        {{ with .Params.source }}| <a href="{{ . }}">Source</a>{{ end }}
      </p>
    {{ end }}
    
    <div style="margin-top: 20px;">
      {{ .Content }}
    </div>
  </article>
{{ end }}
