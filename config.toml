baseURL       = "https://localhost:1313/"
languageCode  = "en-us"
title         = "abap_tidy"
enableGitInfo = true

[[cascade]]
type = "docs"
[cascade.params]
license          = "CC BY 3.0"
license_url      = "https://creativecommons.org/licenses/by/3.0/"
source_copyright = "2019-2021 SAP SE or an SAP affiliate company and styleguides contributors"
source_name      = "SAP/styleguides"
[cascade._target]
path = "{/clean-code,/clean-code/**}"

[frontmatter]
lastmod = [":git", "lastmod", ":fileModTime"]

[markup.goldmark.renderer]
unsafe = true # Allow HTML in markdown

[markup.highlight]
noClasses = false

[[menu.main]]
name    = "Clean ABAP"
pageRef = "/clean-code"
weight  = 1

[[menu.main]]
name   = "Search"
weight = 2
[menu.main.params]
type = "search"

[[menu.main]]
name        = "GitHub"
url         = "https://github.com/SAP/styleguides"
weight      = 3
params.icon = "github"

[[module.imports]]
path = "github.com/imfing/hextra"

[pagination]
pagerSize = 10

[params]
description        = "ABAP resources in a human-friendly format"
displayUpdatedDate = true
dateFormat         = "2006-01-02"

[params.author]
name = "Tobias Buckdahn"

[params.navbar]
displayTitle = true
displayLogo  = false

[taxonomies]
tag      = "tags"
category = "categories"
