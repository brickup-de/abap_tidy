baseURL       = "https://localhost:1313/"
languageCode  = "en-us"
title         = "Tidy ABAP"
enableGitInfo = true

[[cascade]]
type = "docs"
[cascade._target]
path = "{/clean-code,/clean-code/**}"

[frontmatter]
lastmod = [":git", "lastmod", "date", ":fileModTime"]

[markup.goldmark.renderer]
unsafe = true # Allow HTML in markdown

[markup.highlight]
noClasses = false

[[menu.main]]
name    = "Clean ABAP"
pageRef = "/clean-code"
weight  = 1

[[menu.main]]
name   = "Search"
weight = 2
[menu.main.params]
type = "search"

[[menu.main]]
name   = "GitHub"
url    = "https://github.com/SAP/styleguides"
weight = 3
[menu.main.params]
icon = "github"

[[module.imports]]
path = "github.com/imfing/hextra"

[pagination]
pagerSize = 10

[params]
description        = "Clean Code guidelines for ABAP development"
displayUpdatedDate = true
dateFormat         = "2006-01-02"

[params.author]
name = "SAP Styleguides"

[params.navbar]
displayTitle = true
displayLogo  = false

[taxonomies]
tag      = "tags"
category = "categories"
